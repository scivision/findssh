name: ci

on:
  push:
    paths:
    - "**.py"
    - .github/workflows/ci.yml
    - "**.toml"

jobs:

  ci:
    timeout-minutes: 15
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        python-version: ["3.9", "3.x"]
        os: [ubuntu-latest]
        include:
        - python-version: "3.x"
          os: windows-latest
        - python-version: "3.x"
          os: macos-latest

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - run: pip install .[tests]

    - name: type annotation check
      run: mypy --non-interactive --install-types

    - run: pytest
      timeout-minutes: 2

    - name: main command line
      run: python -m findssh
      timeout-minutes: 1

    - uses: pre-commit-ci/lite-action@v1.1.0
      if: always()
